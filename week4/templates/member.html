<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>會員頁面</title>
    <style>
        body { font-family: Arial, sans-serif; 
            text-align: center; 
            padding-top: 50px; }


        .success-box { border: 1px solid #ccc; 
                        width: 400px; 
                        margin: 0 auto; 
                        padding: 0; 
                        border-radius: 5px; }

        .upper {
                background-color: #1e3246;
                text-align: center;
                align-items: center;
                justify-content: center;
                padding: 20px 0;
                width:100%;
                height: 60px;
                display: flex;}


        .upperWord{
                font-size: 30px;
                font-weight: bold;
                color: white;}


        a { color: #0066cc; 
            text-decoration: underline; 
            display: inline-block; 
            margin-bottom: 50px; 
            font-size: 20px;}
        p{
            margin-top: 40px;
            font-size: 20px;
            margin-bottom: 0; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="upper">
            <div class="upperWord">歡迎光臨,這是會員頁</div>
        </div>
        <p>恭喜您,成功登入系統</p>
        <a href="/logout">登出系統</a>
    </div>
</body>
</html>
